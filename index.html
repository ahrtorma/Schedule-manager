<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Options</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --border: #2a2a38;
    --accent: #7c6af7; --text: #e8e8f0; --muted: #7070a0;
    --good: #6af7c0; --bad: #f76a8a; --mid: #f7c46a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; padding: 16px; }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: var(--accent); }
  .subtitle { font-size: 12px; color: var(--muted); margin-bottom: 20px; font-family: 'JetBrains Mono', monospace; }
  .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .filter-label { font-size: 11px; color: var(--muted); width: 100%; margin-bottom: 2px; font-family: 'JetBrains Mono', monospace; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .sort-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .sort-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 5px 10px; border-radius: 5px; font-size: 11px; font-family: 'JetBrains Mono', monospace; cursor: pointer; transition: all 0.15s; }
  .sort-btn.active { background: #2a1f4a; border-color: var(--accent); color: var(--accent); }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; padding: 10px 12px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .count-label { font-size: 11px; color: var(--muted); margin-bottom: 12px; font-family: 'JetBrains Mono', monospace; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
  .badge-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .badge-work { background: #1a2a1a; color: #6af7a0; border: 1px solid #2a5a2a; }
  .badge-diana { background: #2a1f4a; color: #b09af7; border: 1px solid #4a3a8a; }
  .badge-sleep { background: #1a1f2a; color: #6ab4f7; border: 1px solid #2a3a5a; font-size:10px; }
  .score-badge { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; }
  .score-high { background: #0d2d22; color: var(--good); border: 1px solid #1a5a40; }
  .score-mid { background: #2d2500; color: var(--mid); border: 1px solid #5a4a00; }
  .score-low { background: #2d0d15; color: var(--bad); border: 1px solid #5a1a28; }
  .score-zero { background: #1a1a22; color: var(--muted); border: 1px solid var(--border); }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .info-item { background: #12121a; border-radius: 6px; padding: 8px 10px; }
  .info-item.full { grid-column: span 2; }
  .info-key { font-size: 10px; color: var(--muted); margin-bottom: 3px; font-family: 'JetBrains Mono', monospace; }
  .info-val { font-size: 12px; font-weight: 500; color: var(--text); }
  .info-val.good { color: var(--good); }
  .info-val.mid { color: var(--mid); }
  .info-val.bad { color: var(--bad); }
  .info-val.dim { color: var(--muted); }
</style>
</head>
<body>
<h1>Schedule Options</h1>
<div class="subtitle">Wonjun work start x Diana work/sleep — 48 combinations</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--good)"></div>Contact 6h+</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--mid)"></div>3~5h</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--bad)"></div>1~2h</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--muted)"></div>0h</div>
</div>

<div class="filter-bar" id="workFilter">
  <div class="filter-label">Wonjun work start time (KST)</div>
  <button class="filter-btn active" onclick="setFilter('work','all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('work','09',this)">9:00</button>
  <button class="filter-btn" onclick="setFilter('work','11',this)">11:00</button>
  <button class="filter-btn" onclick="setFilter('work','1130',this)">11:30</button>
  <button class="filter-btn" onclick="setFilter('work','13',this)">13:00</button>
</div>

<div class="filter-bar" id="dianaFilter">
  <div class="filter-label">Diana's work pattern</div>
  <button class="filter-btn active" onclick="setFilter('diana','all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('diana','9to6',this)">9-to-6</button>
  <button class="filter-btn" onclick="setFilter('diana','morning',this)">Morning shift</button>
  <button class="filter-btn" onclick="setFilter('diana','afternoon',this)">Afternoon shift</button>
</div>

<div class="sort-bar">
  <div class="filter-label" style="width:100%">Sort by</div>
  <button class="sort-btn active" onclick="setSort('contact',this)">Contact time ↓</button>
  <button class="sort-btn" onclick="setSort('sleep',this)">Sleep overlap ↓</button>
  <button class="sort-btn" onclick="setSort('work',this)">Work start ↑</button>
</div>

<div class="count-label" id="countLabel"></div>
<div id="container"></div>

<script>
function toMin(h,m=0){return h*60+m;}
function tStr(m){
  const h=Math.floor(m/60)%24,min=m%60;
  return h+':'+(min===0?'00':min<10?'0'+min:min);
}
function koDe(m){
  const de=((Math.floor(m/60)%24)-8+24)%24;
  const min=m%60;
  return de+':'+(min===0?'00':min<10?'0'+min:min);
}
function rangeKoDe(s,e){return koDe(s)+'~'+koDe(e);}

function intersectSegs(a,b){
  function expand(s,e){if(e<=s)e+=1440;return[s,e];}
  let best=0,bs=0,be=0;
  for(let sa=0;sa<=1;sa++)for(let sb=0;sb<=1;sb++){
    let[as,ae]=expand(a[0]+sa*1440,a[1]+sa*1440);
    let[bss,bse]=expand(b[0]+sb*1440,b[1]+sb*1440);
    let os=Math.max(as,bss),oe=Math.min(ae,bse);
    if(oe-os>best){best=oe-os;bs=os;be=oe;}
  }
  return{min:best,start:bs%1440,end:be%1440};
}

const workOpts=[
  {key:'09',label:'9:00 start',end:toMin(17),wake:toMin(8),sleep:toMin(1)},
  {key:'11',label:'11:00 start',end:toMin(19),wake:toMin(10),sleep:toMin(3)},
  {key:'1130',label:'11:30 start',end:toMin(19,30),wake:toMin(10,30),sleep:toMin(3,30)},
  {key:'13',label:'13:00 start',end:toMin(21),wake:toMin(12),sleep:toMin(5)},
];

// Diana bedtime (German time) -> KST +8h, 8h sleep assumed
const dOpts=[
  {de:23,koSleep:toMin(7),koWake:toMin(15)},
  {de:22,koSleep:toMin(6),koWake:toMin(14)},
  {de:21,koSleep:toMin(5),koWake:toMin(13)},
  {de:20,koSleep:toMin(4),koWake:toMin(12)},
];

// Diana active hours by work pattern (KST)
// 9-to-6: German 18:00~bedtime -> KST 02:00~bedtime
// Morning shift (9-13): German 13:00~bedtime -> KST 21:00~bedtime
// Afternoon shift (13-18): German 09~13 -> KST 17~21, German 18~bedtime -> KST 02~bedtime
const patterns=[
  {key:'9to6',label:'9-to-6',getSegs:d=>[[toMin(2),d.koSleep]]},
  {key:'morning',label:'Morning shift',getSegs:d=>[[toMin(21),d.koSleep]]},
  {key:'afternoon',label:'Afternoon shift',getSegs:d=>[[toMin(17),toMin(21)],[toMin(2),d.koSleep]]},
];

const data=[];
for(const w of workOpts){
  for(const pat of patterns){
    for(const d of dOpts){
      const myContact=[w.end,w.sleep];
      const activeSegs=pat.getSegs(d);
      let totalMin=0;
      let contactParts=[];
      for(const seg of activeSegs){
        const r=intersectSegs(myContact,seg);
        if(r.min>0){
          totalMin+=r.min;
          contactParts.push(tStr(r.start)+'~'+tStr(r.end)+' KST ('+rangeKoDe(r.start,r.end)+' CET)');
        }
      }
      const contactH=Math.round(totalMin/60*10)/10;

      const mySleep=[w.sleep,w.wake];
      const dSleep=[d.koSleep,d.koWake];
      const sr=intersectSegs(mySleep,dSleep);
      const overlapH=Math.round(sr.min/60*10)/10;

      const deWake=(d.de+8)%24;
      data.push({
        work:w.key,workLabel:w.label,
        wakeup:tStr(w.wake)+' KST',sleepTime:tStr(w.sleep)+' KST',offWork:tStr(w.end)+' KST',
        diana:pat.key,dianaLabel:pat.label,
        dianaSleepKo:tStr(d.koSleep)+'~'+tStr(d.koWake)+' KST ('+d.de+':00~'+deWake+':00 CET)',
        dianaSleepDe:'Diana bedtime '+d.de+':00 CET',
        contactH,overlapH,
        contactStr:contactParts.length>0?contactParts.join(', '):'None',
      });
    }
  }
}

let wF='all',dF='all',sBy='contact';

function setFilter(type,val,btn){
  if(type==='work'){
    wF=val;
    document.querySelectorAll('#workFilter .filter-btn').forEach(b=>b.classList.remove('active'));
  } else {
    dF=val;
    document.querySelectorAll('#dianaFilter .filter-btn').forEach(b=>b.classList.remove('active'));
  }
  btn.classList.add('active');render();
}
function setSort(val,btn){sBy=val;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

function sClass(h){if(h===0)return'score-zero';if(h>=6)return'score-high';if(h>=3)return'score-mid';return'score-low';}
function vClass(h){if(h===0)return'dim';if(h>=6)return'good';if(h>=3)return'mid';return'bad';}
function slClass(h){if(h>=6)return'good';if(h>=3)return'mid';return'';}

function render(){
  let list=data.filter(d=>(wF==='all'||d.work===wF)&&(dF==='all'||d.diana===dF));
  list.sort((a,b)=>sBy==='contact'?b.contactH-a.contactH:sBy==='sleep'?b.overlapH-a.overlapH:a.work.localeCompare(b.work));
  document.getElementById('countLabel').textContent=list.length+' combinations shown';
  const c=document.getElementById('container');
  c.innerHTML='';
  list.forEach(d=>{
    const el=document.createElement('div');
    el.className='card';
    el.innerHTML=`
      <div class="card-header">
        <div class="badge-row">
          <span class="badge badge-work">Wonjun ${d.workLabel}</span>
          <span class="badge badge-diana">Diana: ${d.dianaLabel}</span>
          <span class="badge badge-sleep">${d.dianaSleepDe}</span>
        </div>
        <span class="score-badge ${sClass(d.contactH)}">${d.contactH}h</span>
      </div>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-key">Wonjun wake / sleep</div>
          <div class="info-val">${d.wakeup} / ${d.sleepTime}</div>
        </div>
        <div class="info-item">
          <div class="info-key">Wonjun off work</div>
          <div class="info-val">${d.offWork}</div>
        </div>
        <div class="info-item full">
          <div class="info-key">Diana's sleep</div>
          <div class="info-val">${d.dianaSleepKo}</div>
        </div>
        <div class="info-item">
          <div class="info-key">Sleep overlap</div>
          <div class="info-val ${slClass(d.overlapH)}">${d.overlapH}h</div>
        </div>
        <div class="info-item full">
          <div class="info-key">Available contact window</div>
          <div class="info-val ${vClass(d.contactH)}">${d.contactStr}${d.contactH>0?' — '+d.contactH+'h total':''}</div>
        </div>
      </div>
    `;
    c.appendChild(el);
  });
}
render();
</script>
</body>
</html>
